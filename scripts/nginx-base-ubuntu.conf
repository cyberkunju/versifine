# /etc/nginx/conf.d/00-base.conf
# Base http-level directives for the Ubuntu reticule box.
#
# This file supplies the three things the repo's versifine.conf /
# versifine-proxy.conf depend on:
#   1. client_max_body_size   (http level — applies to all server blocks)
#   2. the $connection_upgrade map (used by versifine-proxy.conf)
#   3. a default catch-all server that drops unknown Host headers (444)
#
# The 00- prefix makes nginx load this before versifine.conf so the map and
# the default_server exist when the versifine vhost is parsed.

client_max_body_size 25M;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- Default catch-all: drop unknown Host headers / bare-IP probes --------
# Bot scans, vulnerability probes, and bare-IP traffic that doesn't match a
# real server_name get 444 (close connection without response). An ssl
# default_server needs a cert; we reuse the versifine origin cert since it's
# the only domain this box serves.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;

    server_name _;

    ssl_certificate     /etc/ssl/versifine.com/cert.pem;
    ssl_certificate_key /etc/ssl/versifine.com/key.pem;

    return 444;
}
