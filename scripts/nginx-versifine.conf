# /etc/nginx/conf.d/versifine.conf
# Front door for Versifine. HTTP on :80, HTTPS on :443 (Cloudflare full-strict).
#
# The default catch-all in /etc/nginx/conf.d/hastkala.conf already drops
# unknown Host headers (return 444). This file only declares the
# versifine.com / www.versifine.com server blocks.
#
# `client_max_body_size` is declared in hastkala.conf at the http {} level;
# the limit applies to all server blocks so we don't redeclare it here.

upstream versifine_web   { server 127.0.0.1:3100; keepalive 32; }
upstream versifine_api   { server 127.0.0.1:5100; keepalive 32; }
upstream versifine_wabot { server 127.0.0.1:5101; keepalive 16; }

# --- Plain HTTP — redirect to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name versifine.com www.versifine.com;
    return 301 https://$host$request_uri;
}

# --- HTTPS (Cloudflare Origin certificate) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name versifine.com www.versifine.com;

    ssl_certificate     /etc/ssl/versifine.com/cert.pem;
    ssl_certificate_key /etc/ssl/versifine.com/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "camera=(self), microphone=(self), geolocation=(self), payment=(self)" always;

    access_log /var/log/nginx/versifine.access.log;
    error_log  /var/log/nginx/versifine.error.log warn;

    include /etc/nginx/snippets/versifine-routes.conf;
}
