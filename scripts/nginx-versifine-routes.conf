## Shared route block — included from both :80 and :443 server blocks.

# WhatsApp QR pairing page. Polls itself every 5s on the bot side.
location = /wa-qr      { return 302 /wa-qr/; }
location = /wa-qr/ {
    proxy_pass http://versifine_wabot/qr;
    include /etc/nginx/snippets/versifine-proxy.conf;
    add_header Cache-Control "no-store" always;
}
location = /wa-qr/qr.png {
    proxy_pass http://versifine_wabot/qr.png;
    include /etc/nginx/snippets/versifine-proxy.conf;
    add_header Cache-Control "no-store" always;
}

# API proxy
location /api/ {
    proxy_pass         http://versifine_api/;
    include /etc/nginx/snippets/versifine-proxy.conf;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
}

# WebSocket upgrade for /ws (real-time events). The trailing slash here is
# intentional: nginx strips the location prefix so the upstream sees /ws.
location = /ws {
    proxy_pass         http://versifine_api/ws;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
    # Long-lived connection; disable nginx's read timeout for it.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

# Bot internal HTTP (for operator endpoints — only QR + healthz are exposed).
location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
}

# SvelteKit's adapter-node serves both static assets (under /_app/) and SSR
# pages from the same Node process. Long-cache the immutable client chunks.
location ^~ /_app/ {
    proxy_pass         http://versifine_web;
    include /etc/nginx/snippets/versifine-proxy.conf;
    expires 7d;
    add_header Cache-Control "public, immutable";
}

# Static assets emitted at the root (favicon, manifest, models/*).
location ~* ^/[^/]+\.(?:ico|png|svg|webp|woff2?|txt|json|webmanifest)$ {
    proxy_pass         http://versifine_web;
    include /etc/nginx/snippets/versifine-proxy.conf;
    expires 1d;
}
location ^~ /models/ {
    proxy_pass         http://versifine_web;
    include /etc/nginx/snippets/versifine-proxy.conf;
    # Models are immutable artefacts (versioned by manifest).
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# Everything else → SvelteKit SSR
location / {
    proxy_pass         http://versifine_web;
    include /etc/nginx/snippets/versifine-proxy.conf;
}
