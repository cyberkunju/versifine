name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'scripts/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.base.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-versifine
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          # Single production target: Ubuntu arm64, login user `reticule`.
          # The old Fedora box is intentionally not deployed.
          - name: reticule
            host_secret: RETICULE_HOST
            key_secret: RETICULE_SSH_KEY
            user: reticule
    name: deploy (${{ matrix.name }})
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets[matrix.key_secret] }}
          SSH_HOST: ${{ secrets[matrix.host_secret] }}
          SSH_USER: ${{ matrix.user }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<EOF
          Host versifine
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
          EOF

      - name: Trigger remote deploy
        run: |
          ssh versifine "set -e; \
            curl -fsSL 'https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/scripts/remote-deploy.sh' -o /tmp/versifine-deploy.sh && \
            BRANCH=${{ github.ref_name }} bash /tmp/versifine-deploy.sh"

      - name: Smoke test (origin via Host header)
        env:
          SSH_HOST: ${{ secrets[matrix.host_secret] }}
        run: |
          set -e
          for url in / /healthz /api/health /admin; do
            code=$(curl -sk -o /dev/null -w '%{http_code}' \
              -H 'Host: versifine.com' \
              "https://$SSH_HOST$url" || true)
            echo "GET $url -> $code"
            case $code in
              2*|3*) ;;
              *) echo "::error::[${{ matrix.name }}] Smoke test failed for $url ($code)"; exit 1 ;;
            esac
          done
